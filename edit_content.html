<!DOCTYPE html>
<html lang="utf-8">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice HTML5</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <!-- 테마 추가 (선택) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/mdn-like.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/duotone-light.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/lucario.min.css">
    <!-- 2. CodeMirror JS Core -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <!-- 3. 구문 강조 모드 (HTML/JS/CSS) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>
    <!-- 리스트 드래그 앤 드롭 -->
    <link href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css" rel="stylesheet" type="text/css" />
    <script src="https://code.jquery.com/jquery-1.12.4.js"></script>
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>
    <!-- jstree -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jstree/3.3.17/jstree.min.js" integrity="sha512-Rzhxh2sskKwa+96nRopp/hvGexBzEPG6mnFI6uRy059FZfksJJFYmqDFn050KUDhivXLsT6SvoaEf5iSp2SHjg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <!-- js -->
    <script type="javascript" src="https://raw.githubusercontent.com/Minjukang727/PracticeHTML5/Deploy/js/edit.js"></script>
    <script type="javascript" src="https://raw.githubusercontent.com/Minjukang727/PracticeHTML5/Deploy/js/edit_category.js"></script>
    <script type="javascript" src="https://raw.githubusercontent.com/Minjukang727/PracticeHTML5/Deploy/js/edit_code.js"></script>
    <script type="javascript" src="https://raw.githubusercontent.com/Minjukang727/PracticeHTML5/Deploy/js/edit_quiz.js"></script>
    <!-- css -->
    <link href="https://raw.githubusercontent.com/Minjukang727/PracticeHTML5/Deploy/css/index.css" rel="stylesheet" type="text/css"/>
    <link href="https://raw.githubusercontent.com/Minjukang727/PracticeHTML5/Deploy/css/category.css" rel="stylesheet" type="text/css"/>
    <link href="https://raw.githubusercontent.com/Minjukang727/PracticeHTML5/Deploy/css/code.css" rel="stylesheet" type="text/css"/>
    <link href="https://raw.githubusercontent.com/Minjukang727/PracticeHTML5/Deploy/css/quiz.css" rel="stylesheet" type="text/css"/>
</head>
<body>
    <div>
        <span class="title">Practice HTML5</span>
    </div>
    <div id="edit_type"><span>수정 유형: </span>
            <input type="radio" name="edit_type" value="category"/>목차
            <input type="radio" name="edit_type" value="code" checked/>예제 코드
            <input type="radio" name="edit_type" value="quiz"/>퀴즈
    </div>
    
    <div class="content">
        <div class="desc">
            <div id="type_category">
                <div id="category_header">
                <div><span>단원 추가</span><button class="btn blue small square" id="add_chapter" title="단원 추가" onclick="addChapter()">+</button></div>
                <div><input type="checkbox" id="multi_select" name="multi_select" checked/> <span class="font_size10">여러 챕터 동시에 선택옮서 옮기기</span></div>
                </div>
                <ul class="level_0" id="chapterUL_0">
                    <!-- 단원 목록이 추가될 영역 -->
                </ul>
            </div>

            <div id="type_code">
                <div class="chapter">
                    <div id="main_title">
                        <select class="chapter_title" id="chapter_title" name="chapter_title">
                            <option value="" selected>직접 입력</option>
                        </select>
                        <input type="text" class="chapter_title" name="chapter_title" placeholder="단원 제목">
                    </div>
                    <button class="btn red small square" id="delete_input" onclick="deleteSubTitle()" title="최하위 부제목 제거">-</button>
                    <button class="btn blue small square" id="add_input" onclick="addSubTitle()" title="소제목 추가">+</button>
                </div>
                <div class="concept"><textarea class="input_desc" placeholder="개념 설명"></textarea></div>
                <div class="example">
                    <div class="example_header">
                        <div class="example_title">
                            <input type="text" class="ex_num input_ex_num" placeholder="예제 2-1">
                            <input type="text" class="ex_title input_ex_title" placeholder="줄바꿈을 수행하는 br 요소">
                        </div>
                        <div class="btn_group">
                            <button class="btn green normal square" id="convert" onclick="convertCode()" title="코드 변환">↻</button>
                            <button class="btn green normal square" id="run" onclick="runCode()" title="코드 실행">▶</button>
                        </div>
                    </div>
                    <textarea class="input_ex_code" id="example_code" placeholder="코드 입력"></textarea>
                    <hr>
                    <div class="practice_bottom">
                        <div class="result" id="result"></div>
                    </div>
                </div>
            </div>

            <div id="type_quiz">
                <div class="quiz_type">
                    <input type="radio" name="quiz_type" value="objective" checked/><span> 객관식</span>
                    <input type="radio" name="quiz_type" value="subjective"/><span> 주관식</span>
                </div>
                <div class="image">
                    <div class="img_input">
                        <span>이미지 삽입: </span>
                        <input type="file" name="quiz_img_dir" accept="image/*"/>
                        <button class="btn red small square" title="이미지 제거" onclick="clearFileInput('quiz_img_dir')">X</button>
                        <div class="img_length">
                                <span>이미지 크기: </span>
                                <input type="text" class="img_length_input width" name="ans_img_w" placeholder="너비">
                                <span>x</span>
                                <input type="text" class="img_length_input height" name="ans_img_h" placeholder="높이">
                                <input type="text" id="img_ratio" name="img_ratio" hidden/>
                                <button class="btn green small square" id="resize_quiz_image" title="이미지 크기 변경" onclick="resizeImage('#resize_quiz_image', $(this).siblings('.width').val(), $(this).siblings('.height').val())">✔</button>
                            </div>
                    </div>
                    <img src="" alt="퀴즈 사진">
                </div>
                
                <textarea id="question" placeholder="퀴즈 입력"></textarea>

                <div id="options">
                    <div class="op_group"><span>1. </span><input type="text" class="quiz_op" placeholder="선택지 1"></div>
                    <div class="op_group"><span>2. </span><input type="text" class="quiz_op" placeholder="선택지 2"></div>
                    <div class="op_group"><span>3. </span><input type="text" class="quiz_op" placeholder="선택지 3"></div>
                    <div class="op_group"><span>4. </span><input type="text" class="quiz_op" placeholder="선택지 4"></div>

                    <div class="last_option op_group">
                        <input type="checkbox" name="add_option" value="add_option"/><span> 선택지 추가</span> 
                        <div class="last_option_input"><span>5. </span><input type="text" class="quiz_op" placeholder="선택지 5"></div>
                    </div>
                </div>

                <div id="solution">
                    <span>정답: </span>
                    <div id="answer_options">
                        <input type="radio" name="answer" value="1"/><span>①</span>
                        <input type="radio" name="answer" value="2"/><span>②</span>
                        <input type="radio" name="answer" value="3"/><span>③</span>
                        <input type="radio" name="answer" value="4"/><span>④</span>
                        <input type="radio" name="answer" value="5"/><span>⑤</span>
                    </div>
                    <div class="image">
                        <div class="img_input">
                            <span>이미지 삽입: </span>
                            <input type="file" name="answer_img_dir" accept="image/*"/>
                            <button class="btn red small square" title="이미지 제거" onclick="clearFileInput('answer_img_dir')">X</button>
                            <div class="img_length">
                                <span>이미지 크기: </span>
                                <input type="text" class="img_length_input width" name="ans_img_w" placeholder="너비">
                                <span>x</span>
                                <input type="text" class="img_length_input height" name="ans_img_h" placeholder="높이">
                                <input type="text" id="img_ratio" name="img_ratio" hidden/>
                                <button class="btn green small square" id="resize_answer_image" title="이미지 크기 변경" onclick="resizeImage('#resize_answer_image',$(this).siblings('.width').val(), $(this).siblings('.height').val())">✔</button>
                            </div>
                        </div>
                        <img src="" alt="퀴즈 풀이 사진">
                    </div>
                    <textarea id="quiz_solution" placeholder="풀이 입력"></textarea>
                </div>
            </div>
            <button class="btn orange long lectangle" id="save" title="저장" onclick="saveContent()" title="저장">SAVE</button>
        </div>
    </div>
</body>
</html>
