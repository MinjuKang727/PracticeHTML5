<!DOCTYPE html>
<html lang="utf-8">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 리스트 드래그 앤 드롭 -->
    <link href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css" rel="stylesheet" type="text/css" />
    <script src="https://code.jquery.com/jquery-1.12.4.js"></script>
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>
    <!-- sortableJS -->
    <script src="http://SortableJS.github.io/Sortable/Sortable.js"></script>
     <!-- <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script> -->

    <!-- jstree -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jstree/3.3.17/jstree.min.js" integrity="sha512-Rzhxh2sskKwa+96nRopp/hvGexBzEPG6mnFI6uRy059FZfksJJFYmqDFn050KUDhivXLsT6SvoaEf5iSp2SHjg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <!-- js -->
    <script type="text/javascript" src="js/edit.js" defer></script>
    <script type="text/javascript" src="js/edit_category.js" defer></script>
    <script type="text/javascript" src="js/edit_code.js" defer></script>
    <script type="text/javascript" src="js/edit_quiz.js" defer></script>
    <!-- css -->
    <link href="css/index.css" rel="stylesheet" type="text/css"/>
    <link href="css/category.css" rel="stylesheet" type="text/css"/>
    <link href="css/code.css" rel="stylesheet" type="text/css"/>
    <link href="css/quiz.css" rel="stylesheet" type="text/css"/>
</head>
<body>
    <div>
        <span class="title">Practice HTML5</span>
    </div>
    <div id="edit_data_type"><span>수정 유형: </span>
            <input type="radio" class="check_input" name="edit_data_type" value="CATEGORY"/><span class="checkInput_info left">목차</span>
            <input type="radio" class="check_input" name="edit_data_type" value="CODE" checked/><span class="checkInput_info left">예제 코드</span>
            <input type="radio" class="check_input" name="edit_data_type" value="QUIZ"/><span class="checkInput_info left">퀴즈</span>
    </div>
    
    <div class="content flex-column">
        <div class="desc">
            <div id="type_category"> <!-- 목차 편집 영역 -->
                <div id="category_header" class="flex-row">
                    <div>
                        <span>단원 추가</span>
                        <button class="btn blue small square" id="add_chapter" title="단원 추가" onclick="addChapter()">+</button>
                        <input type="file" name="upload_json" accept=".json" title="JSON 파일로 단원 불러오기">
                    </div>
                    <div id="multiSelectSort" class="flex-row">
                        <input type="checkbox" class="check_input" name="multiSelectSort" />
                        <span class="font_size10 checkInput_info right">단원 재정렬</span>
                        <img class="info_icon cursor-pointer" src="images/icon/info.png" alt="단원 재정렬 안내">
                    </div>
                </div>
                <ul id="chapterUL_0">
                    <!-- 단원 목록이 추가될 영역 -->
                </ul>
            </div>

            <div id="type_code"> <!-- 예제 코드 편집 영역 -->
                <div class="chapter flex-row"><!-- 목차 태그 입력할 부분 --></div>
                <textarea name="ex_concept" class="focus-event" placeholder="개념 설명"></textarea>
                <div class="example">
                    <div class="ex_header flex-row">
                        <div class="example_title flex-row">
                            <input type="text" class="focus-event" name="ex_num" placeholder="예제 _-_">
                            <input type="text" class="focus-event" name="ex_title" placeholder="예제 제목">
                        </div>
                        <div class="btn_group flex-row">
                            <!-- <button class="btn green normal square" id="convertCode" onclick="convertCode()" title="코드 변환">↹</button> -->
                            <button class="btn lightblue normal square" id="resetCode" onclick="resetCode()" title="코드 초기화"><img src="images/icon/eraser2.png" alt="지우개"></button>
                            <button class="btn lightblue normal square" id="runCode" onclick="runCode()" title="코드 실행"><img src="images/icon/right-arrow1.png" alt="오른쪽 삼각형"></button>
                        </div>
                    </div>
                    <div class="flex-row" id="code_editor">
                        <div id="line_numbers" class="focus-event"><span>1</span></div>
                        <textarea class="html" name="input_code" placeholder="여기에 코드를 입력하세요"></textarea>
                        <iframe id="code_result" sandbox="allow-scripts"></iframe>
                    </div>
                </div>
            </div>

            <div id="type_quiz"> <!-- 퀴즈 편집 영역 -->
                <div class="chapter flex-row"><!-- 목차 태그 입력할 부분 --></div>
                <div class="quiz_type">
                    <input type="radio" class="check_input" name="quiz_type" value="Obj" checked/><span  class="checkInput_info left"> 객관식</span>
                    <input type="radio" class="check_input" name="quiz_type" value="Subj"/><span class="checkInput_info left"> 주관식</span>
                </div>
                <div id="question">
                    <div class="image flex-column"><!-- 이미지 파일 추가 태그 입력할 부분 --></div>
                    <textarea class="focus-event" name="q_text" placeholder="퀴즈 내용을 입력해주세요."></textarea>
                </div>
                

                <div id="obj_options">
                    <!-- 선택지 1 ~ 4번 들어갈 부분 -->
                    <div class="last_option op_group flex-row">
                        <input type="checkbox" class="check_input" name="add_option" value="add_option"/><span class="checkInput_info left"> 선택지 추가</span> 
                        <!-- 선택지 5번 들어갈 부분 -->
                    </div>
                </div>
                <hr>
                <div class="flex-column" id="solution">
                    <div class="flex-row">
                    <span>정답: </span>
                    <div id="obj_answer" class="flex-row"><!-- 정답 선택지 1 ~ 5번 들어갈 부분 --></div>
                    </div>
                    <textarea id="subj_answer" class="focus-event" name="subj_answer" placeholder="정답을 입력해 주세요."></textarea>
                    <div class="image flex-column"><!-- 이미지 파일 추가 태그 입력할 부분 --></div>
                    <textarea name="sol_text" class="focus-event" placeholder="풀이를 입력해 주세요."></textarea>
                </div>
            </div>
            <div class="flex-row">
                <button class="btn orange long lectangle" id="saveContent" onclick="saveContent()" title="입력한 내용을 저장합니다.">저장</button>
                <button class="btn red long lectangle" id="resetContent" onclick="resetContent()" title="입력 내용을 모두 지우고 처음 상태로 되돌립니다.">초기화</button>
            </div>
        </div>
    </div>
</body>
</html>
